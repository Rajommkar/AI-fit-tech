<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Fit-Tech | Pro Biometrics & Coaching</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- Portal View -->
      <div id="portal_view" class="portal-view animate-fade">
        <header>
          <div class="logo">AI FIT-<span>TECH</span></div>
          <nav>
            <a href="#" class="active">Workouts</a>
            <a href="#">Programs</a>
            <a href="#">Community</a>
          </nav>
        </header>

        <section class="hero">
          <h2>Your Personal AI Biomechanics Coach.</h2>
          <p>Professional-grade movement analysis, real-time coaching, and 100+ exercises at your fingertips.</p>
        </section>

        <div class="filter-bar" id="filter_bar">
          <button class="filter-btn active" data-filter="all">All Exercises</button>
          <button class="filter-btn" data-filter="upper">Upper Body</button>
          <button class="filter-btn" data-filter="lower">Lower Body</button>
          <button class="filter-btn" data-filter="core">Core & Abs</button>
          <button class="filter-btn" data-filter="yoga">Yoga/Mobility</button>
        </div>

        <div class="workout-grid" id="workout_grid">
          <!-- Cards generated dynamically -->
        </div>
      </div>

      <!-- Session View (Camera Mode) -->
      <div id="session_view" class="session-view hidden">
        <button id="exit_session" class="exit-btn">EXIT SESSION</button>

        <div id="unilateral_toggle" class="unilateral-toggle hidden">
          <button class="side-btn active" data-side="left">LEFT</button>
          <button class="side-btn" data-side="right">RIGHT</button>
        </div>

        <div class="video-wrap">
          <video id="webcam" autoplay playsinline></video>
          <canvas id="output_canvas"></canvas>
          
          <div class="session-hud">
            <div class="hud-left">
              <div class="hud-stat">
                <span class="label">REPS</span>
                <span id="rep_count" class="value">0</span>
              </div>
              <div class="hud-stat">
                <span class="label">CONSISTENCY</span>
                <span id="consistency_meter" class="value">0%</span>
              </div>
            </div>

            <div class="hud-right">
              <div class="ai-coach-tag">AI COACH</div>
              <p id="coaching_text" class="coaching-msg">Position yourself in the frame to begin.</p>
              <button id="save_ghost" class="side-btn" style="margin-top: 1rem; width: 100%; border: 1px solid var(--primary);">SAVE GHOST PR</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
