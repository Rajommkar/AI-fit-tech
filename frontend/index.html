<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fit-Tech | Elite Coach</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <main class="main-content">
            <!-- 1. LANDING -->
            <section id="entry_point" class="app-section">
                <div style="text-align: center; margin-top: 15vh;">
                    <h1 style="font-size: 5rem; font-weight: 900; margin-bottom: 1rem;">
                        Master Your <span style="color: #00ffff;">Form</span>
                    </h1>
                    <p style="color: #888; font-size: 1.25rem; margin-bottom: 4rem;">
                        Elite AI coaching with real-time biomechanical analysis.
                    </p>
                    <button id="start_workout_cta" class="btn btn-primary">Start Training Session</button>
                </div>
            </section>

            <section id="setup_screen" class="app-section hidden">
                <div style="max-width: 900px; margin: 0 auto;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                        <h2 style="font-size: 2.5rem;">Select Your Focus</h2>
                        <button id="back_to_landing" class="btn btn-outline" style="padding: 0.5rem 1rem;">&larr; Back</button>
                    </div>
                    <div id="exercise_selector" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem;">
                        <!-- Exercises injected here -->
                    </div>
                    <button id="begin_session_btn" class="btn btn-primary" style="margin-top: 4rem; width: 100%;">Initialize Tracking</button>
                </div>
            </section>

            <!-- 3. LIVE -->
            <section id="live_workout" class="app-section hidden">
                <div id="live-workout" class="live-container">
                    <div class="camera-section">
                        <video id="videoFeed" autoplay playsinline></video>
                        <canvas id="poseCanvas"></canvas>
                    </div>

                    <div class="coach-panel">
                        <div class="exercise-name" id="exerciseName">Pushups</div>

                        <div class="rep-display" id="repCount">0</div>

                        <div class="feedback" id="feedbackText">
                            Ready? Start your first rep.
                        </div>

                        <div class="metrics">
                            <div>Speed: <span id="speedVal">—</span></div>
                            <div>Rating: <span id="ratingVal">—</span></div>
                        </div>

                        <button id="finishBtn" disabled>Finish Session</button>
                    </div>
                </div>
            </section>

            <!-- 4. DASHBOARD -->
            <div id="dashboard_overlay" class="app-section hidden dashboard-overlay-shell">
                <div class="dashboard-shell">
                    <div class="dashboard-topbar">
                        <h1>Session Summary</h1>
                        <button id="close_dashboard_btn" class="btn btn-outline">Return Home</button>
                    </div>

                    <div id="dashboard" class="dashboard-container">
                        <div class="hero-metrics">
                            <div class="card">
                                <h3>Score</h3>
                                <p id="scoreVal">0</p>
                            </div>

                            <div class="card">
                                <h3>Reps</h3>
                                <p id="totalRepsVal">0</p>
                            </div>

                            <div class="card">
                                <h3>Streak</h3>
                                <p id="streakVal">0</p>
                            </div>
                        </div>

                        <div class="insights">
                            <div class="card">
                                <h3>Best Exercise</h3>
                                <p id="bestExercise">—</p>
                            </div>

                            <div class="card">
                                <h3>Needs Work</h3>
                                <p id="worstExercise">—</p>
                            </div>

                            <div class="card">
                                <h3>Trend</h3>
                                <p id="trendVal">—</p>
                            </div>
                        </div>

                        <div class="breakdown" id="exerciseBreakdown"></div>

                        <div class="dashboard-actions">
                            <button id="openCoachBtn" type="button">View AI Coach</button>
                            <button id="openPlanBtn" type="button">View Plan</button>
                        </div>

                        <div id="coachSection" class="detail-panel hidden">
                            <div class="detail-panel__header">
                                <h2>AI Coach</h2>
                                <button id="backToDashboardBtn" type="button" class="btn btn-outline">Back to Summary</button>
                            </div>
                            <ul id="coach-advice" class="coach-advice-list"></ul>
                        </div>

                        <div id="planSection" class="detail-panel hidden">
                            <div class="detail-panel__header">
                                <h2>7-Day Plan</h2>
                                <button id="backToDashboardBtnPlan" type="button" class="btn btn-outline">Back to Summary</button>
                            </div>
                            <div id="workout_plan_text"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
