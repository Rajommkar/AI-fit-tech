<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Fit-Tech | Baseline</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <div id="session_view" class="session-view">
        <div class="video-wrap">
          <video id="webcam" autoplay playsinline style="width: 100%; height: 100vh; object-fit: cover; transform: scaleX(-1);"></video>
          <canvas id="output_canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2010; transform: scaleX(-1); pointer-events: none;"></canvas>
          
          <div class="session-hud">
            <div class="hud-panel">
              <div class="hud-stat">
                <span class="label">REPS</span>
                <span id="rep_count" class="value">0</span>
              </div>
              <div class="hud-stat">
                <span class="label">CONSISTENCY</span>
                <span id="consistency_meter" class="value">0%</span>
              </div>
            </div>
            <div class="coach-panel">
              <p id="coaching_text">Ready? Select an exercise to start.</p>
              <select id="exercise_select" style="background: black; color: white; padding: 0.5rem; margin-top: 1rem; border: 1px solid white;"></select>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
